<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Contact page for Sub-Zero fan website. Accessible HTML form example.">
<title>Contact Sub-Zero Fan Page</title>
<link rel="stylesheet" href="Webpage.css">
</head>

<body>

<header>
<h1>Sub-Zero Fan Page</h1>

<nav>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="subzero-contact.html">Contact</a></li>
</ul>
</nav>
</header>

<main>

<section>
<h2>Contact Us</h2>

<form id="contactForm">

<div>
<label for="name">Full Name</label>
<input type="text" id="name" name="name" required>
<span class="error" id="nameError"></span>
</div>

<div>
<label for="email">Email Address</label>
<input type="email" id="email" name="email" required>
<span class="error" id="emailError"></span>
</div>

<div>
<label for="topic">Topic</label>
<select id="topic" name="topic" required>
<option value="">Select a topic</option>
<option value="general">General Question</option>
<option value="game">Game Discussion</option>
<option value="feedback">Website Feedback</option>
</select>
</div>

<div>
<label for="message">Message</label>
<textarea id="message" name="message" rows="4" required></textarea>
<span class="error" id="messageError"></span>
</div>

<button type="submit">Send Message</button>

</form>
</section>

</main>

<footer>
<p>&copy; 2026 Sub-Zero Fan Page</p>
</footer>

<script>
document.getElementById("contactForm").addEventListener("submit", function(event){

let valid = true;

let name = document.getElementById("name").value.trim();
let email = document.getElementById("email").value.trim();
let message = document.getElementById("message").value.trim();

if(name === ""){
document.getElementById("nameError").textContent = "Name is required";
valid = false;
} else {
document.getElementById("nameError").textContent = "";
}

if(email === ""){
document.getElementById("emailError").textContent = "Email is required";
valid = false;
} else {
document.getElementById("emailError").textContent = "";
}

if(message === ""){
document.getElementById("messageError").textContent = "Message is required";
valid = false;
} else {
document.getElementById("messageError").textContent = "";
}

if(!valid){
event.preventDefault();
}

});
</script>

</body>
</html>
